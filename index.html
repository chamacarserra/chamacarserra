<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chama Car Serra</title>

<style>
body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:#0f2d4a;
color:white;
text-align:center;
}

header{
background:#163e63;
padding:20px;
font-size:26px;
font-weight:bold;
}

.container{
padding:20px;
max-width:400px;
margin:auto;
}

input{
width:100%;
padding:15px;
margin:10px 0;
border-radius:10px;
border:none;
font-size:16px;
}

button{
width:100%;
padding:15px;
background:#ffc107;
border:none;
border-radius:10px;
font-size:18px;
font-weight:bold;
cursor:pointer;
}

.resultado{
margin-top:20px;
font-size:22px;
color:#ffc107;
font-weight:bold;
}
</style>
</head>

<body>

<header>🚖 Chama Car Serra</header>

<div class="container">

<input id="origem" placeholder="Local de saída">
<input id="destino" placeholder="Destino">
<input id="km" placeholder="KM da viagem (ex: 8)">

<button onclick="calcular()">Calcular Valor</button>

<div class="resultado" id="valor"></div>

</div>

<script>

// TABELA FIXA
const tabela = {
"centro":15,
"são cristóvão":15,
"alto da conceição":15,
"aabb":16,
"várzea":16,
"ipsep":16,
"bom jesus":16,
"cagep":16,
"mutirão":16,
"cohab":16,
"universitário 2":16,
"caxixola":18,
"tancredo neves":18,
"borboleta":18,
"quitandinha":18,
"malhada":18,
"vila bela":20,
"hec":22,
"jardim das oliveiras":22,
"uast":22
};

function calcular(){

let destino = document.getElementById("destino").value.toLowerCase();
let km = parseFloat(document.getElementById("km").value);
let valor = 0;

// verifica tabela
if(tabela[destino]){
valor = tabela[destino];
}else{
valor = km * 2.70;
}

// adicional noturno
let hora = new Date().getHours();

if(hora >= 22 && hora < 24){
valor += 5;
}

if(hora >= 0 && hora < 5){
valor += 10;
}

document.getElementById("valor").innerHTML =
"Valor da viagem: R$ " + valor.toFixed(2);
}

</script>

</body>
</html>
