<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chama Car Serra</title>

<style>
body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:#0b2a4a;
color:white;
text-align:center;
}

header{
background:#0e3b66;
padding:20px;
}

.container{
padding:20px;
}

input, select{
width:90%;
padding:15px;
margin:10px 0;
border:none;
border-radius:8px;
font-size:16px;
}

button{
background:#ffcc00;
color:#0b2a4a;
border:none;
padding:15px;
width:90%;
font-size:18px;
border-radius:8px;
font-weight:bold;
cursor:pointer;
}

.resultado{
margin-top:20px;
font-size:22px;
font-weight:bold;
color:#ffcc00;
}
</style>
</head>

<body>

<header>
<h2>🚖 Chama Car Serra</h2>
<p>Solicite sua viagem</p>
</header>

<div class="container">

<input type="text" placeholder="Local de saída">

<input type="text" placeholder="Destino">

<input type="number" id="km" placeholder="KM da viagem">

<select>
<option>Modelo do carro</option>
<option>VW UP</option>
<option>HB20</option>
<option>Onix</option>
<option>Outro</option>
</select>

<button onclick="calcular()">Calcular Valor</button>

<div class="resultado" id="valor"></div>

</div>

<script>
function calcular(){
let km = document.getElementById("km").value;

if(km == ""){
alert("Digite o KM da viagem");
return;
}

let valor = km * 2.70;

document.getElementById("valor").innerHTML =
"Valor da viagem: R$ " + valor.toFixed(2);
}
</script>

</body>
</html>
