<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chama Car Serra</title>

<style>
body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:linear-gradient(135deg,#0f2a44,#1c4c7a);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
background:white;
width:90%;
max-width:400px;
padding:25px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,0.3);
text-align:center;
}

h1{
margin-bottom:5px;
}

.carro{
color:#555;
margin-bottom:20px;
}

input{
width:100%;
padding:15px;
margin:10px 0;
border-radius:10px;
border:1px solid #ccc;
font-size:16px;
}

button{
width:100%;
padding:15px;
border:none;
border-radius:10px;
background:#28a745;
color:white;
font-size:18px;
font-weight:bold;
cursor:pointer;
margin-top:10px;
}

button:hover{
background:#218838;
}

.resultado{
margin-top:20px;
font-size:22px;
font-weight:bold;
color:#0f2a44;
}
</style>
</head>

<body>

<div class="container">
<h1>🚖 Chama Car Serra</h1>
<div class="carro">VW Up Branco • Motorista Particular</div>

<input type="text" id="saida" placeholder="Local de saída">
<input type="text" id="destino" placeholder="Destino">
<input type="number" id="km" placeholder="KM da viagem">

<button onclick="calcular()">Calcular Valor</button>

<div class="resultado" id="resultado"></div>

<button onclick="enviarWhats()">Chamar no WhatsApp</button>
</div>

<script>
let valorKm = 2.70;

function calcular(){
let km = document.getElementById("km").value;
if(km == ""){
alert("Digite a distância!");
return;
}

let total = km * valorKm;
document.getElementById("resultado").innerHTML =
"Valor da corrida: R$ " + total.toFixed(2);
}

function enviarWhats(){
let saida = document.getElementById("saida").value;
let destino = document.getElementById("destino").value;
let km = document.getElementById("km").value;
let total = (km * valorKm).toFixed(2);

let mensagem =
"Olá! Quero solicitar uma corrida.%0A" +
"Saída: " + saida + "%0A" +
"Destino: " + destino + "%0A" +
"Distância: " + km + "km%0A" +
"Valor: R$ " + total;

window.open("https://wa.me/5587991350771?text=" + mensagem);
}
</script>

</body>
</html>
